<svg viewBox="0 0 1975 576" xmlns="http://www.w3.org/2000/svg">
  <!-- Wings -->
  <g id="wings">
    <!-- Left wing top -->
    <path d="M 280 240 Q 320 180 360 160" stroke="#16223B" stroke-width="24" fill="none" stroke-linecap="round"/>
    <!-- Left wing bottom -->
    <path d="M 280 240 Q 320 280 360 300" stroke="#16223B" stroke-width="24" fill="none" stroke-linecap="round"/>
    <!-- Right wing top -->
    <path d="M 380 240 Q 420 180 460 160" stroke="#16223B" stroke-width="24" fill="none" stroke-linecap="round"/>
    <!-- Right wing bottom -->
    <path d="M 380 240 Q 420 280 460 300" stroke="#16223B" stroke-width="24" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Center feathers (rust color) -->
  <g id="feathers">
    <path d="M 320 280 L 310 340" stroke="#B5502E" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M 340 290 L 335 360" stroke="#B5502E" stroke-width="20" fill="none" stroke-linecap="round"/>
    <path d="M 360 295 L 360 370" stroke="#B5502E" stroke-width="20" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text: Minla -->
  <text x="600" y="340" font-family="Fraunces, serif" font-size="280" font-weight="300" fill="#16223B" letter-spacing="-2">Minla</text>
  
  <!-- Text: LABS -->
  <text x="600" y="420" font-family="Inter, sans-serif" font-size="80" font-weight="400" fill="#16223B" letter-spacing="12">LABS</text>
</svg>